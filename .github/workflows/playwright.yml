name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

  # ── Manual trigger — choose which environment to test ──────────────────────
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - preprod
          - reviewapp

env:
  ENV: ${{ github.event.inputs.environment || 'qa' }}
  TEST_AGENT_EMAIL:         ${{ secrets.AGENT_EMAIL }}
  TEST_AGENT_PASSWORD:      ${{ secrets.AGENT_PASSWORD }}
  TEST_SOLICITOR_EMAIL:     ${{ secrets.SOLICITOR_EMAIL }}
  TEST_SOLICITOR_PASSWORD:  ${{ secrets.SOLICITOR_PASSWORD }}
  TEST_BUYER_EMAIL:         ${{ secrets.BUYER_EMAIL }}
  TEST_BUYER_PASSWORD:      ${{ secrets.BUYER_PASSWORD }}
  TEST_SELLER_EMAIL:        ${{ secrets.SELLER_EMAIL }}
  TEST_SELLER_PASSWORD:     ${{ secrets.SELLER_PASSWORD }}
  TEST_ADMIN_EMAIL:         ${{ secrets.ADMIN_EMAIL }}
  TEST_ADMIN_PASSWORD:      ${{ secrets.ADMIN_PASSWORD }}
  OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Auth setup
  # ─────────────────────────────────────────────────────────────────────────────
  auth-setup:
    name: Auth Setup (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
  
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Cache auth state
        id: cache-auth
        uses: actions/cache@v4
        with:
          path: .auth/
          key: auth-${{ runner.os }}-${{ env.ENV }}-${{ hashFiles('fixtures/auth.setup.ts') }}-${{ github.sha }}
          restore-keys: |
            auth-${{ runner.os }}-${{ env.ENV }}-${{ hashFiles('fixtures/auth.setup.ts') }}-
      - name: Run auth setup
        if: steps.cache-auth.outputs.cache-hit != 'true'
        run: npx playwright test fixtures/auth.setup.ts --project=setup
      - uses: actions/upload-artifact@v4
        with:
          name: auth-state-${{ env.ENV }}
          path: .auth/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Test data seeding
  # ─────────────────────────────────────────────────────────────────────────────
  test-data-setup:
    name: Test Data Setup (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    needs: auth-setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
  
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: auth-state-${{ env.ENV }}
          path: .auth/
      - name: Seed test data
        run: npx playwright test fixtures/test-data.setup.ts --project=setup
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: test-data-manifest-${{ env.ENV }}
          path: .test-data/manifest.json
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Functional tests
  # ─────────────────────────────────────────────────────────────────────────────
  functional-tests:
    name: Functional Tests (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    needs: test-data-setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
  
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: auth-state-${{ env.ENV }}
          path: .auth/
      - uses: actions/download-artifact@v4
        with:
          name: test-data-manifest-${{ env.ENV }}
          path: .test-data/
        continue-on-error: true
      - name: Run functional tests
        run: npx playwright test --ignore=tests/visual/ --ignore=tests/performance/ --ignore=tests/accessibility/
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ env.ENV }}
          path: playwright-report/
          retention-days: 7
      - name: AI failure analysis
        if: failure()
        run: npm run analyse-failures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Accessibility tests — WCAG 2.1 AA (Phase 8)
  # ─────────────────────────────────────────────────────────────────────────────
  accessibility-tests:
    name: Accessibility Tests / WCAG 2.1 AA (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    needs: test-data-setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
  
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: auth-state-${{ env.ENV }}
          path: .auth/
      - uses: actions/download-artifact@v4
        with:
          name: test-data-manifest-${{ env.ENV }}
          path: .test-data/
        continue-on-error: true
      - name: Run accessibility tests
        run: npm run test:a11y
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report-${{ env.ENV }}
          path: playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Visual regression — Percy
  # ─────────────────────────────────────────────────────────────────────────────
  visual-percy:
    name: Visual Regression / Percy (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    needs: test-data-setup
    if: ${{ vars.PERCY_ENABLED == 'true' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
  
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: auth-state-${{ env.ENV }}
          path: .auth/
      - uses: actions/download-artifact@v4
        with:
          name: test-data-manifest-${{ env.ENV }}
          path: .test-data/
        continue-on-error: true
      - name: Run visual tests with Percy
        run: npx percy exec -- npx playwright test tests/visual/
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-report-percy-${{ env.ENV }}
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Visual regression — Applitools
  # ─────────────────────────────────────────────────────────────────────────────
  visual-applitools:
    name: Visual Regression / Applitools (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    needs: test-data-setup
    if: ${{ vars.APPLITOOLS_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
  
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: auth-state-${{ env.ENV }}
          path: .auth/
      - uses: actions/download-artifact@v4
        with:
          name: test-data-manifest-${{ env.ENV }}
          path: .test-data/
        continue-on-error: true
      - name: Run visual tests with Applitools
        run: npx playwright test tests/visual/
        env:
          APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
          CI: true

  # ─────────────────────────────────────────────────────────────────────────────
  # API contract tests — Pact
  # ─────────────────────────────────────────────────────────────────────────────
  contract-tests:
    name: API Contract Tests / Pact (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    needs: test-data-setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
  
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: auth-state-${{ env.ENV }}
          path: .auth/
      - name: Run Pact consumer contract tests
        run: npm run test:contracts
        env:
          CI: true
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
      - name: Publish pacts to Pact Broker
        if: ${{ success() && vars.PACT_BROKER_ENABLED == 'true' }}
        run: npm run pact:publish
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PACT_CONSUMER_VERSION: ${{ github.sha }}
          PACT_CONSUMER_TAGS: ${{ github.ref_name }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pact-files-${{ env.ENV }}
          path: pacts/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Performance baseline assertions
  # ─────────────────────────────────────────────────────────────────────────────
  performance-tests:
    name: Performance Baselines (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    needs: test-data-setup
    if: ${{ vars.PERFORMANCE_ENABLED != 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
  
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: auth-state-${{ env.ENV }}
          path: .auth/
      - name: Run performance baseline tests
        run: npx playwright test --project=performance
        env:
          CI: true
        continue-on-error: ${{ vars.PERFORMANCE_REQUIRED != 'true' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report-${{ env.ENV }}
          path: playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Cleanup test data
  # ─────────────────────────────────────────────────────────────────────────────
  test-data-cleanup:
    name: Test Data Cleanup (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    needs: [functional-tests, accessibility-tests, visual-percy, contract-tests, performance-tests]
    if: always() && vars.CLEANUP_TEST_DATA == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
  
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: auth-state-${{ env.ENV }}
          path: .auth/
      - uses: actions/download-artifact@v4
        with:
          name: test-data-manifest-${{ env.ENV }}
          path: .test-data/
        continue-on-error: true
      - name: Teardown test data
        run: npx playwright test fixtures/test-data.setup.ts --project=setup --grep="cleanup"
        env:
          CLEANUP_TEST_DATA: "true"
